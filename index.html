<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBBSE Result 2026</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #bced0a 0%, #0dadd0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #submitBtn {
            padding: 50 100 50;
        }

        span {
            color: red;
        }

        .imglogo {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .form-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem;
            padding-bottom: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            color: #1e293b;
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.4rem;
            font-family: 'Times New Roman', Times, serif;
        }

        h3 {
            font-family: Arial, Helvetica, sans-serif;
            color: #0552cf;
            text-align: center;
            font-size: 1 rem;
        }

        .input-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #475569; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #1241c3; }

        /* Popup Styles */
        #popup {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 100;
        }
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 99;
        }
    </style>
</head>
<body>

<div class="form-card">
    <div class="imglogo">
        <img src="wbbselogo.png" width="60" alt="A descriptive text of the image">
    </div>

    <h2>West Bengal Board of Secondary Education</h2>
    <h3>Result 2026</h3>
    <form id="resultForm">
        <div class="input-group">
            <label>Student's Name <span>*</span></label>
            <input type="text" name="name" placeholder="Enter Full Name" required>
        </div>
        <div class="input-group">
            <label>Roll Number <span>*</span> (11 Digits)</label>
            <input type="text" name="roll" pattern="^[0-9]{6}[A-Za-z]{1}[0-9]{4}$" placeholder="Example: 123456N1234" title="Enter 11 digits: 6 numbers, 1 letter, 4 numbers" required>
        </div>
        <div class="input-group">
            <label>Date of Birth <span>*</span> (As per Admit)</label>
            <input type="date" name="dob" required>
        </div>
        <div class="input-group">
            <label>WhatsApp Number <span>*</span></label>
            <input type="tel" name="whatsapp" placeholder="9876543210" required>
        </div>
        <button type="submit" id="submitBtn">Check Result</button>
    </form>
</div>

<!-- Success Popup -->
<div id="overlay"></div>
<div id="popup">
    <div style="font-size: 50px; color: #22c55e;">✓</div>
    <h3>Thank You!</h3>
    <p>Your Marksheet details will be sent to your provided WhatsApp number soon.</p>
    <button onclick="location.reload()" style="background: #64748b; margin-top: 10px;">Close</button>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxbuIAK152OWjJfwqUzALNFYhOW-Vss-u2HvKVPybethb1q4Yqk5dsV9Fx7CDTTWjE1aA/exec';
    const form = document.getElementById('resultForm');

    form.addEventListener('submit', e => {
        e.preventDefault();
        document.getElementById('submitBtn').innerText = "Sending...";
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                document.getElementById('overlay').style.display = 'block';
                document.getElementById('popup').style.display = 'block';
            })
            .catch(error => console.error('Error!', error.message));
    });
</script>

</body>
</html>
